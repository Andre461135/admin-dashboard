{% extends "base.html" %}
{% block title %}Login - Admin Dashboard{% endblock %}
{% block auth_content %}
<div class="auth-page">
    <div class="auth-bg">
        <div class="gradient-sphere gs-1"></div>
        <div class="gradient-sphere gs-2"></div>
        <div class="gradient-sphere gs-3"></div>
    </div>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="fas fa-cube"></i>
                </div>
                <h1>Welcome Back</h1>
                <p>Sign in to your admin dashboard</p>
            </div>
            <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="form-group">
                    <label for="username">
                        <i class="fas fa-user"></i>
                        Username or Email
                    </label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required>
                </div>
                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i>
                        Password
                    </label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    <button type="button" class="password-toggle" id="passwordToggle">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" name="remember">
                        <span class="checkmark"></span>
                        Remember me
                    </label>
                    <a href="{{ url_for('auth.forgot_password') }}" class="forgot-link">Forgot Password?</a>
                </div>
                <button type="submit" class="btn btn-primary btn-block">
                    <span>Sign In</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>
            <div class="auth-footer">
                <p>Demo: admin / admin123</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
