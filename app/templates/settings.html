{% extends "base.html" %}
{% block title %}Settings{% endblock %}
{% block content %}
<div class="page-header">
    <div>
        <h1 class="page-title">Settings</h1>
        <p class="page-subtitle">Manage your account settings</p>
    </div>
</div>

<div class="settings-grid">
    <div class="card">
        <div class="card-header">
            <h3><i class="fas fa-key"></i> Change Password</h3>
        </div>
        <div class="card-body">
            <form method="POST" action="{{ url_for('settings.change_password') }}" class="form">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="form-group">
                    <label>Current Password</label>
                    <input type="password" name="current_password" required>
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" name="new_password" required>
                </div>
                <div class="form-group">
                    <label>Confirm New Password</label>
                    <input type="password" name="confirm_password" required>
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Update Password
                </button>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <h3><i class="fas fa-palette"></i> Appearance</h3>
        </div>
        <div class="card-body">
            <div class="setting-item">
                <div class="setting-info">
                    <h4>Theme</h4>
                    <p>Switch between dark and light mode</p>
                </div>
                <div class="theme-switch-wrapper">
                    <button class="theme-switch-btn" id="settingsThemeToggle">
                        <i class="fas fa-{{ 'sun' if current_user.theme == 'light' else 'moon' }}"></i>
                        <span>{{ current_user.theme|capitalize }} Mode</span>
                    </button>
                </div>
            </div>
            <div class="setting-item">
                <div class="setting-info">
                    <h4>Notifications</h4>
                    <p>Receive dashboard notifications</p>
                </div>
                <label class="toggle-switch">
                    <input type="checkbox" id="notifToggle" {{ 'checked' if current_user.notifications_enabled else '' }}>
                    <span class="toggle-slider"></span>
                </label>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('settingsThemeToggle')?.addEventListener('click', function() {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    fetch('/settings/toggle-theme', {
        method: 'POST',
        headers: {'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token() }}'},
        body: JSON.stringify({theme: next})
    }).then(() => {
        document.documentElement.setAttribute('data-theme', next);
        this.innerHTML = '<i class="fas fa-' + (next === 'light' ? 'sun' : 'moon') + '"></i> ' + next.charAt(0).toUpperCase() + next.slice(1) + ' Mode';
    });
});

document.getElementById('notifToggle')?.addEventListener('change', function() {
    fetch('/settings/toggle-notifications', {
        method: 'POST',
        headers: {'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token() }}'},
        body: JSON.stringify({enabled: this.checked})
    });
});
</script>
{% endblock %}
