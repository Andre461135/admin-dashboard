version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=change-this-in-production
      - FLASK_ENV=production
    volumes:
      - ./app/database:/app/app/database
      - ./app/static/uploads:/app/app/static/uploads
    restart: unless-stopped
